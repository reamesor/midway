[toolchain]
anchor_version = "0.30.1"
# Build via ./build.sh with Agave 4.1.1 platform-tools (see README).
# Omitting solana_version stops `anchor` from force-installing 1.18.17.

[features]
resolution = true
skip-lint = false

[programs.localnet]
midway_treasury = "7gMuZXqypiLQQKBgHfCtjzrsSh6MFn6Hk1ftm4h5Ysnc"

[programs.devnet]
midway_treasury = "7gMuZXqypiLQQKBgHfCtjzrsSh6MFn6Hk1ftm4h5Ysnc"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
